name: CI

# Guards the Rust -> C++ port. Coverage:
#   - portable core (core + capture + app-lib + tests) on Windows / macOS / Linux
#   - AddressSanitizer + UBSan on the manual-memory paths (ring buffer, locks, RAII)
#   - the ONNX inference backend (vendored runtime + fixture model)
#   - the benchmark harness (short smoke run)
#   - frontend dependency vulnerability audit
#   - the reused React frontend (typecheck + tests + build)
#   - the Windows desktop app (no-launch integration smoke)
#   - docs invariants
#
# Anti-hang guarantees: every job has `timeout-minutes`, the riskiest steps have their
# own step timeout, ctest uses `--timeout`/`--no-tests=error`, the GUI app is never
# launched, and `concurrency` cancels superseded runs so nothing piles up.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CMAKE_BUILD_PARALLEL_LEVEL: "4"

jobs:
  # ---------------------------------------------------------------------------
  # Dependency vulnerability audit. This checks the committed frontend lockfile
  # against npm's advisory database and fails on high/critical vulnerabilities.
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security audit / frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend npm dependencies
        working-directory: frontend
        run: npm audit --package-lock-only --audit-level=high

  # ---------------------------------------------------------------------------
  # Portable core on all three OSes: pure logic, no webview, no ONNX. Must stay
  # green everywhere (the capture/app sources are #if-guarded per platform).
  # ---------------------------------------------------------------------------
  cpp-headless:
    name: C++ headless tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure core
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSNAPBACK_BUILD_APP=OFF -DSNAPBACK_ONNX=OFF

      - name: Build C++ tests
        run: cmake --build build --target snapback_tests --config Release

      - name: Run CTest
        run: ctest --test-dir build -C Release --output-on-failure --timeout 120 --no-tests=error

  # ---------------------------------------------------------------------------
  # AddressSanitizer + UBSan (Linux/clang). Highest-value guard for the SPSC ring
  # buffer, lock discipline, and RAII — the places Rust's borrow checker used to
  # protect us and we now uphold by hand.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizers (asan+ubsan)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CC: clang
      CXX: clang++
      # Leak detection off: third-party statics (sqlite) and singletons report benign
      # "still reachable"; we want real memory errors + UB, not those.
      ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (sanitized)
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build tests
        run: cmake --build build --target snapback_tests

      - name: Run CTest (sanitized)
        run: ctest --test-dir build --output-on-failure --timeout 300 --no-tests=error

  # ---------------------------------------------------------------------------
  # ThreadSanitizer (Linux/clang). Runs the concurrency tests — the SPSC ring stress
  # (test_ring_buffer.cpp) and the AppState reader/writer race test (test_app_state.cpp)
  # — under TSan to catch data races in the hand-rolled acquire/release ring and lock-order
  # bugs in the two-mutex state split. RelWithDebInfo keeps TSan fast enough for the
  # 500k-iteration ring test; the 600s ctest timeout is the safety net.
  # ---------------------------------------------------------------------------
  thread-sanitizer:
    name: ThreadSanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CC: clang
      CXX: clang++
      TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (tsan)
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build tests
        run: cmake --build build --target snapback_tests

      - name: Run CTest (tsan)
        run: ctest --test-dir build --output-on-failure --timeout 600 --no-tests=error

  # ---------------------------------------------------------------------------
  # Feature-parity fixtures: shared JSON scenarios replayed through FeatureExtractor
  # and diffed against the live Rust source-of-truth extractor.
  # ---------------------------------------------------------------------------
  feature-parity:
    name: Rust/C++ feature parity fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout C++ port
        uses: actions/checkout@v4

      - name: Checkout Rust source of truth
        uses: actions/checkout@v4
        with:
          repository: KassaSana/Snapback
          ref: master
          path: rust-source

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-source/src-tauri

      - name: Install Rust Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            libx11-dev \
            patchelf

      - name: Run dual-language feature parity
        run: python scripts/run_feature_parity_dual.py --rust-repo rust-source --build-dir build-parity

  # ---------------------------------------------------------------------------
  # ONNX backend: vendor the runtime, build with SNAPBACK_ONNX=ON, run tests. The
  # ONNX fixture test loads fixtures/model.onnx and asserts backend() == "onnx".
  # ---------------------------------------------------------------------------
  onnx-windows:
    name: ONNX backend / windows
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      ORT_VERSION: "1.20.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vendor ONNX Runtime
        shell: pwsh
        timeout-minutes: 5
        run: |
          $zip = "onnxruntime-win-x64-$env:ORT_VERSION.zip"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$env:ORT_VERSION/$zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath third_party -Force
          Move-Item "third_party/onnxruntime-win-x64-$env:ORT_VERSION" third_party/onnxruntime
          if (-not (Test-Path third_party/onnxruntime/lib/onnxruntime.dll)) { throw "onnxruntime.dll missing" }

      - name: Configure (ONNX on)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSNAPBACK_ONNX=ON

      - name: Build tests
        run: cmake --build build --config Release --target snapback_tests

      - name: Run CTest (incl. ONNX fixture)
        run: ctest --test-dir build -C Release --output-on-failure --timeout 120 --no-tests=error

  # ---------------------------------------------------------------------------
  # Benchmark smoke: the harness still builds and completes on a short trace.
  # Bounded by SNAPBACK_BENCH_MINUTES and a step timeout so it can't run away.
  # ---------------------------------------------------------------------------
  benchmark-smoke:
    name: Benchmark smoke / linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (benchmarks on)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSNAPBACK_BUILD_BENCHMARKS=ON

      - name: Build benchmark
        run: cmake --build build --config Release --target snapback_benchmarks

      - name: Run short benchmark
        timeout-minutes: 3
        env:
          SNAPBACK_BENCH_MINUTES: "5"
        run: ./build/snapback_benchmarks

  # ---------------------------------------------------------------------------
  # Reused React frontend: typecheck, unit/component tests, production build.
  # ---------------------------------------------------------------------------
  frontend-mock:
    name: Frontend mock tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        timeout-minutes: 8
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Unit and component tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Windows desktop app: build + no-launch integration smoke (never starts the
  # GUI, which would hang). Depends on the core + frontend passing first.
  # ---------------------------------------------------------------------------
  windows-desktop-integration:
    name: Windows desktop integration smoke
    runs-on: windows-latest
    timeout-minutes: 40
    needs: [cpp-headless, frontend-mock]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run Windows demo no-launch smoke
        shell: pwsh
        timeout-minutes: 30
        run: .\scripts\windows_demo.ps1 -NoLaunch

      - name: Upload demo logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-demo-logs
          path: |
            .demo/*.log
            build-windows-demo/**/*.log
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Docs invariants.
  # ---------------------------------------------------------------------------
  docs-smoke:
    name: Docs smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Windows demo runbook is linked
        run: |
          grep -q "docs/windows_demo.md" README.md
          test -f docs/windows_demo.md
