name: Release

# The CD half of the pipeline. CI (ci.yml) proves every push is green; this builds
# the shippable artifact and cuts a GitHub Release. Mirrors the Rust repo's
# release.yml: tag-triggered, builds the installer, uploads it, publishes the release.
#
# Trigger it by pushing a version tag:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Manual runs (workflow_dispatch) build + upload the artifact but skip the Release
# step, so you can smoke a candidate without publishing.
#
# Optional signing: set the SNAPBACK_SIGN_CERTIFICATE_THUMBPRINT repository secret
# on a Windows runner that has the matching Authenticode certificate installed.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # needed to create the GitHub Release

defaults:
  run:
    shell: pwsh

jobs:
  # ---------------------------------------------------------------------------
  # Build the Windows package. package_windows.ps1 runs the frontend suite, the
  # C++ tests (ctest), builds the Release app, and produces the ZIP + IExpress
  # installer. If SNAPBACK_SIGN_CERTIFICATE_THUMBPRINT is configured, the EXE
  # artifacts are Authenticode-signed before upload. It fails hard on any non-zero
  # exit, so a red build can't be released.
  # ---------------------------------------------------------------------------
  windows-package:
    name: Windows package
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Windows package
        timeout-minutes: 40
        env:
          SNAPBACK_SIGN_CERTIFICATE_THUMBPRINT: ${{ secrets.SNAPBACK_SIGN_CERTIFICATE_THUMBPRINT }}
        run: |
          $packageArgs = @()
          if ($env:SNAPBACK_SIGN_CERTIFICATE_THUMBPRINT) {
            Write-Host "Signing Windows release artifacts with the configured certificate."
            $packageArgs += @("-SignCertificate", $env:SNAPBACK_SIGN_CERTIFICATE_THUMBPRINT)
          } else {
            Write-Host "No signing certificate configured; building unsigned Windows artifacts."
          }
          .\scripts\package_windows.ps1 @packageArgs

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapback-windows
          path: |
            build-windows-package/Snapback-*-win64.zip
            build-windows-package/Snapback-*-win64-installer.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish. Only runs for a pushed tag (not manual dispatch), so a workflow_dispatch
  # smoke run stops after the build above.
  # ---------------------------------------------------------------------------
  github-release:
    name: Publish GitHub Release
    needs: windows-package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
