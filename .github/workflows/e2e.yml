# WebDriver end-to-end happy path (built app via tauri-driver).
#
# Manual-only (workflow_dispatch): this is heavier and more fragile than the unit
# / mocked-integration suites, and it has NOT yet been validated green in CI, so
# it deliberately does not gate pushes. Promote it to `on: push` once it runs
# reliably. See e2e/README.md.
name: e2e

on:
  workflow_dispatch:

jobs:
  webdriver-happy-path:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install root and frontend deps
        run: |
          npm install
          npm install --prefix frontend

      - name: Build the desktop app
        run: npm run tauri build

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      # windows-latest ships Edge + msedgedriver; ensure the driver is on PATH.
      # tauri-driver auto-discovers msedgedriver when it is on PATH.
      - name: Ensure msedgedriver on PATH
        shell: pwsh
        run: |
          $driver = (Get-Command msedgedriver.exe -ErrorAction SilentlyContinue)
          if (-not $driver) {
            Write-Host "msedgedriver not found on PATH — set it up for this runner image."
          } else {
            Write-Host "msedgedriver: $($driver.Source)"
          }

      - name: Run E2E happy path
        run: |
          npm install
          npm test
        working-directory: e2e
