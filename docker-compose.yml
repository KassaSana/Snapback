version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "${VITE_API_BASE:-http://localhost:8080}"
    ports:
      - "5173:80"
    depends_on:
      - backend
