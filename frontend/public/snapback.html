<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snapback</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #0e1116;
        --muted: #5f6b7a;
        --accent: #f06b4c;
        --surface: #ffffff;
        --shadow: 0 18px 40px rgba(14, 17, 22, 0.18);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        background: transparent;
        color: var(--ink);
      }
      .overlay {
        margin: 8px;
        padding: 18px 20px 16px;
        background: var(--surface);
        border-radius: 18px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(14, 17, 22, 0.08);
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.65rem;
        color: var(--muted);
        margin: 0 0 8px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.05rem;
        line-height: 1.3;
      }
      .summary {
        margin: 0 0 6px;
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.35;
      }
      .meta {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 0.85rem;
        line-height: 1.4;
      }
      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        background: var(--accent);
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <p class="eyebrow">Snapback</p>
      <h1>Welcome back — here's where you were</h1>
      <p class="summary" id="summary">Loading context...</p>
      <p class="meta" id="meta"></p>
      <div class="actions">
        <button id="dismiss" type="button">Got it</button>
        <p class="hint" id="hint">Enter or Esc · auto-dismiss <span id="countdown">8</span>s</p>
      </div>
    </div>
    <script type="module">
      import { listen } from "@tauri-apps/api/event";
      import { invoke } from "@tauri-apps/api/core";

      const AUTO_DISMISS_SECS = 8;
      const summaryEl = document.getElementById("summary");
      const metaEl = document.getElementById("meta");
      const countdownEl = document.getElementById("countdown");
      let remaining = AUTO_DISMISS_SECS;
      let timerId = null;

      function resetAutoDismiss() {
        remaining = AUTO_DISMISS_SECS;
        countdownEl.textContent = String(remaining);
        if (timerId !== null) {
          window.clearInterval(timerId);
        }
        timerId = window.setInterval(() => {
          remaining -= 1;
          countdownEl.textContent = String(Math.max(remaining, 0));
          if (remaining <= 0) {
            void dismiss();
          }
        }, 1000);
      }

      async function dismiss() {
        if (timerId !== null) {
          window.clearInterval(timerId);
          timerId = null;
        }
        await invoke("dismiss_snapback");
      }

      listen("snapback-data", (event) => {
        const payload = event.payload;
        summaryEl.textContent = payload.summary || "Previous task";
        const parts = [];
        if (payload.file_hint) parts.push(payload.file_hint);
        if (payload.app_name) parts.push(payload.app_name);
        if (payload.distraction_duration_secs) {
          parts.push(`${payload.distraction_duration_secs}s away`);
        }
        metaEl.textContent = parts.join(" · ");
        resetAutoDismiss();
      });

      document.getElementById("dismiss").addEventListener("click", () => {
        void dismiss();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" || event.key === "Enter") {
          event.preventDefault();
          void dismiss();
        }
      });

      resetAutoDismiss();
    </script>
  </body>
</html>
